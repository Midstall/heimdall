# English (default) translations for Heimdall. Keys use dotted-path
# namespaces grouped by surface: tui.*, web.*, common.*. Placeholders use
# braces and are substituted by `t!(key, name = value)` at call sites.

# Log-message keys. The `i18n_key` structured field on each tracing event
# carries the catalog key, so parsers can correlate localized lines across
# languages.

[log.daemon]
starting = "starting daemon on {bind}"
listening = "daemon listening on {addr}"
shutting_down = "shutting down"
no_config = "no --config provided; running with empty DUT registry"
loaded_config = "loaded heimdall.toml: host={host} duts={duts}"
non_loopback_bind = "binding non-loopback address {addr}; no auth, trusted env only"

[log.dump]
complete = "dump complete: {jobs} jobs, {campaigns} campaigns, {events} events, {blobs} blobs"
restore_complete = "restore complete: {jobs} jobs, {campaigns} campaigns, {events} events, {blobs} blobs"

[common]
heimdall = "Heimdall"
yes = "yes"
