[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"
# Justifications live in audit.toml. Keep this list in sync.
ignore = [
    # rsa Marvin Attack; unreachable (sqlx-mysql is macros-only, runtime is sqlite).
    "RUSTSEC-2023-0071",
    # paste 1.0.15 unmaintained; transitive via ratatui, not a CVE.
    "RUSTSEC-2024-0436",
    # lru 0.12.5 IterMut unsoundness; ratatui never calls IterMut.
    "RUSTSEC-2026-0002",
]

[licenses]
version = 2
confidence-threshold = 0.93
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "Zlib",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "0BSD",
    "BSL-1.0",
    "CC0-1.0",
    "OpenSSL",
    # webpki-roots ships under CDLA-Permissive-2.0 (community data license,
    # permissive variant). Trust-store data, no copyleft, fine to allow.
    "CDLA-Permissive-2.0",
]
exceptions = []

[[licenses.clarify]]
crate = "aegis-ip"
expression = "Apache-2.0"
license-files = []

[[licenses.clarify]]
crate = "aegis-sim"
expression = "Apache-2.0"
license-files = []

[bans]
# Duplicate crate versions are a persistent fact of life in a workspace
# this size: tokio-serial/serialport pin old nix+windows-sys, sqlx pulls
# its own hashbrown, crossterm/tempfile straddle rustix 0.38/1.x. None of
# these are actionable from our side (upstreams haven't released bumped
# versions), so we accept the noise instead of maintaining a long skip
# list. Flip back to "warn" if you want visibility on new duplicates.
multiple-versions = "allow"
wildcards = "deny"
allow-wildcard-paths = true
highlight = "all"
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = [
    "https://github.com/Midstall/aegis.git",
]
